name: Flutter Integration Tests (SecureStorage)

# SecureStorage는 실제 Keychain/Keystore가 필요하므로 에뮬레이터에서만 실행 가능.
# 단위 테스트(test/unit/)는 별도 CI 없이 로컬/PR에서 flutter test로 실행.

on:
  push:
    branches: [main]
    paths:
      - 'dash_mobile/lib/storage_service.dart'
      - 'dash_mobile/test/integration/**'
  pull_request:
    branches: [main]
    paths:
      - 'dash_mobile/lib/storage_service.dart'
      - 'dash_mobile/test/integration/**'
  workflow_dispatch: # 수동 실행 허용

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 단위 테스트 (에뮬레이터 불필요 — 항상 실행)
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dash_mobile

    steps:
      - uses: actions/checkout@v4

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: 단위 테스트 실행
        run: flutter test test/unit/ --reporter expanded

  # ────────────────────────────────────────────────────────────────────────────
  # SecureStorage 통합 테스트 (Android 에뮬레이터 필요)
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests-android:
    name: SecureStorage Integration Tests (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dash_mobile

    steps:
      - uses: actions/checkout@v4

      - name: Java 설치 (Android 빌드 필요)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: Android 에뮬레이터에서 통합 테스트 실행
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          working-directory: dash_mobile
          script: |
            flutter test test/integration/secure_storage_integration_test.dart \
              --timeout=120s \
              --reporter expanded

  # ────────────────────────────────────────────────────────────────────────────
  # Extension Jest 테스트
  # ────────────────────────────────────────────────────────────────────────────
  extension-tests:
    name: Extension Jest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dash_extension

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dash_extension/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: Jest 테스트 실행 (커버리지 포함)
        run: npm run test:coverage

      - name: 커버리지 리포트 아티팩트 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: dash_extension/coverage/
          retention-days: 7
