name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'privacy-policy.html'
      - 'security-detail.html'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp privacy-policy.html _site/privacy-policy.html
          cp security-detail.html _site/security-detail.html
          # index.html이 있으면 복사
          [ -f index.html ] && cp index.html _site/index.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
