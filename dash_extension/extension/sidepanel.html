<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="sidepanel.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ===== 1. 로그인 화면 ===== -->
    <div id="login-view" class="view">
        <div class="login-container">
            <div class="login-logo">
                <img src="icon128.png" class="logo-img" alt="Dash Logo" />
            </div>
            <h1 class="login-title">Dash</h1>
            <p class="login-subtitle">현장 활동 기록의 혁신</p>
            <button id="btn-google-login" class="gsi-material-button">
              <div class="gsi-material-button-state"></div>
              <div class="gsi-material-button-content-wrapper">
                <div class="gsi-material-button-icon">
                  <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    <path fill="none" d="M0 0h48v48H0z"></path>
                  </svg>
                </div>
                <span class="gsi-material-button-contents">Google 계정으로 로그인</span>
                <span style="display: none;">Google 계정으로 로그인</span>
              </div>
            </button>
            <p class="login-hint">모바일 앱과 동일한 계정으로 로그인하세요</p>
        </div>
    </div>

    <!-- ===== 2. 메인 화면 (기록 목록) ===== -->
    <div id="main-view" class="view hidden">
        <!-- 상태 메시지 -->
        <div id="status-bar" class="status-bar">
            <div class="status-left">
                <span id="status-icon">✅</span>
                <span id="status-text">삽입할 DB를 선택해주세요</span>
            </div>
            <div class="status-right">
                <img id="profile-pic" class="profile-pic hidden" alt="Profile" />
            </div>
        </div>

        <div id="selection-bar" class="selection-bar hidden">
            <button id="cancel-select-btn" class="text-btn hidden">취소</button>
            <div style="flex: 1;"></div>
            <button id="toggle-select-mode-btn" class="text-btn">
                <span class="circle-icon">○</span>
                <span id="select-mode-text">선택</span>
            </button>
        </div>

        <!-- 기록 목록 -->
        <div id="records-container" class="records-container">
            <!-- 동적으로 카드가 추가됨 -->
        </div>

        <!-- 빈 상태 -->
        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">📋</div>
            <p class="empty-title">대기 중인 기록이 없어요</p>
            <p class="empty-desc">모바일 앱에서 DB를 작성하고<br>'DB 준비시키기'를 눌러보세요</p>
        </div>

        <!-- 하단 액션 -->
        <div id="action-bar" class="action-bar hidden">
            <button id="btn-inject" class="btn btn-primary" disabled>
                <span class="btn-icon-left">⚡</span>
                삽입할 DB를 선택해주세요
            </button>
        </div>

    </div>

    <!-- ===== 3. 주입 결과 화면 ===== -->
    <div id="result-view" class="view hidden">
        <div class="result-container">
            <div class="result-icon">✅</div>
            <h2 class="result-title">주입 완료!</h2>
            <p class="result-desc">데이터가 시스템에 성공적으로 입력되었어요.<br>빨간색 필드가 없는지 확인해 주세요.</p>
            <button id="btn-back-to-list" class="btn btn-outline">목록으로 돌아가기</button>
        </div>
    </div>

    <div class="footer-link">
        <a href="https://roddbstn.github.io/Dash-/" target="_blank">개인정보처리방침</a>
    </div>

    <!-- Core -->
    <script src="core/config.js"></script>
    <script src="core/message-types.js"></script>

    <!-- 엑셀 (유지) -->
    <script src="xlsx.mini.min.js"></script>

    <!-- 메인 로직 -->
    <script src="sidepanel.js"></script>

</body>

</html>
