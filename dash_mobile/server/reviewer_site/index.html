<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dash | Reviewer Board</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>
    <div id="app" class="app-layout">
        <!-- Sidebar -->
        <aside class="info-sidebar">
            <div class="sidebar-content">
                <section class="info-section">
                    <h3>서비스 상세정보</h3>
                    <div class="meta-grid" id="pc-meta-grid">
                        <div class="meta-item">
                            <label>대상자</label>
                            <span id="val-target">불러오는 중...</span>
                        </div>
                    </div>
                </section>
            </div>
            <div class="sidebar-footer">
                <span class="logo">DASH</span>
            </div>
        </aside>

        <!-- Main Content (Header + Editor) -->
        <div class="main-container">
            <header class="main-header">
                <div class="header-left"></div>
                <div class="header-right">
                    <button class="btn btn-action notify-btn" id="btn-notify-header" onclick="openNotifyModal()" disabled style="opacity:0.45; cursor:not-allowed;">수정 완료 알림</button>
                </div>
            </header>

            <main class="editor-area">
                <!-- Mobile Info Accordion (Only visible on mobile) -->
                <div class="mobile-info-trigger" onclick="toggleMobileInfo()">
                    <div class="trigger-top"
                        style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div id="mobile-child-tag"></div>
                        <span class="info-label"
                            style="display: flex; align-items: center; gap: 4px; font-weight: 600;">서비스 상세 정보 <span
                                style="font-size: 1.4em; position: relative; top: -1px;">▾</span></span>
                    </div>
                </div>
                <div id="mobile-info-content" class="mobile-info-content">
                    <div class="meta-grid" id="mobile-meta-grid"></div>
                </div>

                <div class="editor-container">
                    <div class="editor-header">
                        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 16px;">
                            <button id="btn-undo" onclick="undo()" disabled title="실행 취소" style="
                                display: inline-flex; align-items: center; justify-content: center;
                                width: 34px; height: 34px; padding: 0;
                                background: #E9ECEF; border: none; border-radius: 8px;
                                cursor: not-allowed; color: #ADB5BD; font-size: 16px;
                                transition: all 0.15s;
                            ">↩</button>
                            <button id="btn-redo" onclick="redo()" disabled title="다시 실행" style="
                                display: inline-flex; align-items: center; justify-content: center;
                                width: 34px; height: 34px; padding: 0;
                                background: #E9ECEF; border: none; border-radius: 8px;
                                cursor: not-allowed; color: #ADB5BD; font-size: 16px;
                                transition: all 0.15s;
                            ">↪</button>
                            <button id="btn-edit-toggle" onclick="toggleEditMode()" style="
                                background: #F1F3F5; border: none; border-radius: 8px;
                                cursor: pointer; color: #495057; font-size: 13px; font-weight: 600;
                                padding: 0 14px; height: 34px; transition: all 0.15s; margin-left: 2px;
                                font-family: inherit; display: inline-flex; align-items: center;
                            ">✏️ 편집</button>
                            <div id="save-status" class="save-status" style="margin-left: 6px;">방금 저장됨</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                            <h1 id="page-title">불러오는 중...</h1>
                        </div>
                        <div class="editor-meta">
                            <span id="author-name"></span>
                        </div>
                    </div>

                    <div class="writing-workspace">
                        <h4 style="margin-bottom: 12px; color: #4e5968; font-weight: 700; font-size: 14px;">서비스 내용</h4>
                        <textarea id="main-editor" placeholder="서비스 내용을 입력하세요..." oninput="handleTyping()" readonly style="background:#f9fafb; cursor:default; resize:none;"></textarea>

                        <h4
                            style="margin-top: 32px; margin-bottom: 12px; color: #4e5968; font-weight: 700; font-size: 14px;">
                            상담원 소견</h4>
                        <textarea id="opinion-editor" placeholder="상담원 소견을 입력하세요..."
                            oninput="handleTyping()" readonly style="background:#f9fafb; cursor:default; resize:none;"></textarea>
                    </div>
                </div>
            </main>

            <!-- Bottom CTA Button (Mobile) -->
            <div class="mobile-cta-container">
                <button class="btn btn-primary-full notify-btn" id="btn-notify-mobile" onclick="openNotifyModal()" disabled style="opacity:0.45; cursor:not-allowed; background:#ADB5BD;">수정 완료 알림 보내기</button>
            </div>
        </div>

        <!-- Modals -->
        <div id="modal-container" class="modal-backdrop">
            <div class="modal">
                <h2>수정 완료 알림</h2>
                <p>수정된 내용을 공유한 담당자에게 알림을 보낼까요?</p>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                    <button class="btn btn-primary" onclick="confirmNotify()">알림 보내기</button>
                </div>
            </div>
        </div>

        <!-- 이름 인증 모달 (최초 진입 시 강제 표시) -->
        <div id="auth-modal" style="
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        ">
            <div style="
                background: #fff; border-radius: 20px;
                padding: 32px 28px; width: 100%; max-width: 400px;
                box-shadow: 0 8px 40px rgba(0,0,0,0.18);
            ">
                <div style="text-align: center; margin-bottom: 24px;">
                    <span style="font-size: 32px;">🔒</span>
                    <h2 style="margin: 12px 0 8px; font-size: 18px; font-weight: 800; color: #1a1a2e;">본인 확인</h2>
                    <p style="font-size: 14px; color: #8b95a1; line-height: 1.6; margin: 0;">
                        이 DB를 공유한 상담원의<br>성함을 입력해주세요.
                    </p>
                </div>
                <input id="auth-name-input" type="text" placeholder="예) 홍길동"
                    style="
                        width: 100%; box-sizing: border-box;
                        border: 1.5px solid #e5e8eb; border-radius: 12px;
                        padding: 14px 16px; font-size: 15px; font-weight: 600;
                        outline: none; font-family: inherit;
                        transition: border-color 0.2s;
                    "
                    onfocus="this.style.borderColor='#4e73df'"
                    onblur="this.style.borderColor='#e5e8eb'"
                    onkeydown="if(event.key==='Enter') submitAuthName()"
                />
                <p id="auth-error" style="
                    color: #e74c3c; font-size: 13px; margin: 10px 0 0;
                    min-height: 18px; text-align: center;
                "></p>
                <button onclick="submitAuthName()" style="
                    width: 100%; margin-top: 16px;
                    background: #4e73df; color: #fff;
                    border: none; border-radius: 12px;
                    padding: 14px; font-size: 15px; font-weight: 700;
                    cursor: pointer; font-family: inherit;
                    transition: background 0.2s;
                " onmouseover="this.style.background='#3a5bc7'" onmouseout="this.style.background='#4e73df'">
                    확인
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
