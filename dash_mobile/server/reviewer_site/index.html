<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DASH - 공유받은 DB</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 인앱 브라우저 차단 (카카오톡, 라인 등) -->
    <div id="inapp-modal" class="fullscreen-overlay" style="display:none;">
        <div class="modal-card">
            <span class="modal-icon">🌐</span>
            <h2 class="modal-title">브라우저에서 열어주세요</h2>
            <p class="modal-desc">카카오톡·문자 등 앱 내 브라우저에서는<br>링크가 정상 동작하지 않아요.<br><br>주소를 복사해서 <strong>Chrome</strong> 또는<br><strong>Safari</strong>로 열어주세요.</p>
            <button onclick="copyAndClose()" class="btn-modal">주소 복사하기</button>
        </div>
    </div>

    <!-- 메인 랜딩 -->
    <div class="landing-wrap">

        <!-- 헤더 -->
        <header class="landing-header">
            <span class="logo">DASH</span>
        </header>

        <!-- DB 카드 -->
        <div class="db-card">

            <!-- 로딩 -->
            <div id="state-loading" class="state-center">
                <div class="spinner"></div>
                <p>DB를 불러오는 중...</p>
            </div>

            <!-- 오류 -->
            <div id="state-error" class="state-center" style="display:none;">
                <span style="font-size:40px;">🗑</span>
                <p style="color:#8b95a1; margin-top:12px; line-height:1.7;">삭제된 DB이거나<br>유효하지 않은 링크예요.</p>
            </div>

            <!-- 내용 -->
            <div id="db-content" style="display:none;">

                <div class="db-title-row">
                    <h1 class="db-title" id="page-title"></h1>
                    <span class="author-badge" id="author-name"></span>
                </div>

                <!-- 서비스 상세정보 아코디언 -->
                <button class="meta-toggle" onclick="toggleMeta()">
                    <span>서비스 상세 정보</span>
                    <span id="meta-icon">▾</span>
                </button>
                <div id="meta-grid" class="meta-grid" style="display:none;"></div>

                <div class="divider"></div>

                <div class="content-block">
                    <h4 class="content-label">서비스 내용</h4>
                    <p class="content-text" id="main-content"></p>
                </div>

                <div class="content-block" id="opinion-block" style="display:none;">
                    <h4 class="content-label">상담원 소견</h4>
                    <p class="content-text" id="opinion-content"></p>
                </div>

                <div id="enc-notice-area"></div>

            </div>
        </div>

        <!-- CTA 섹션 -->
        <div class="cta-section" id="cta-section" style="display:none;">
            <div class="cta-inner">
                <!-- 상단: 전체 너비 헤더 -->
                <div class="cta-col-header">
                    <img src="/public/logo.png" class="cta-logo" alt="DASH">
                    <div>
                        <p class="cta-title">내 계정에 저장하고 바로 활용하세요</p>
                        <p class="cta-sub">저장 즉시 담당자에게 알림이 전송돼요.</p>

                    </div>
                </div>
                <div class="cta-header-divider"></div>

                <div class="cta-cols">

                    <!-- 왼쪽: 앱 -->
                    <div class="cta-col">
                        <p class="install-hint">앱 설치 후 이 링크를 다시 탭하면<br>바로 내 계정에 저장돼요.</p>
                        <div class="store-buttons">
                            <a href="#" class="btn-store" target="_blank" rel="noopener">
                                <!-- TODO: replace # with Play Store URL when published -->
                                <img src="/public/play_store.svg" class="store-icon" alt="Google Play">
                                <div class="store-text">
                                    <span class="store-sub">Google Play에서</span>
                                    <span class="store-name">다운로드</span>
                                </div>
                            </a>
                            <a href="#" class="btn-store" target="_blank" rel="noopener">
                                <!-- TODO: replace # with App Store URL when published -->
                                <img src="/public/app_store.svg" class="store-icon" alt="App Store">
                                <div class="store-text">
                                    <span class="store-sub">App Store에서</span>
                                    <span class="store-name">다운로드</span>
                                </div>
                            </a>
                        </div>
                    </div>

                    <!-- 세로 구분선 -->
                    <div class="cta-divider"></div>

                    <!-- 오른쪽: 확장프로그램 -->
                    <div class="cta-col">
                        <div class="ext-preview-wrap" onclick="openLightbox()">
                            <img src="/public/ext_preview.png" class="ext-preview" alt="확장프로그램 미리보기">
                            <div class="ext-expand-btn" aria-label="크게 보기">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 3 21 3 21 9"/>
                                    <polyline points="9 21 3 21 3 15"/>
                                    <line x1="21" y1="3" x2="14" y2="10"/>
                                    <line x1="3" y1="21" x2="10" y2="14"/>
                                </svg>
                            </div>
                        </div>
                        <a href="#" class="btn-store" target="_blank" rel="noopener">
                            <!-- TODO: replace # with Chrome Web Store URL when published -->
                            <img src="/public/chrome_webstore.png" class="store-icon" alt="Chrome Web Store">
                            <div class="store-text">
                                <span class="store-sub">Chrome 웹 스토어에서</span>
                                <span class="store-name">확장프로그램 설치</span>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <div class="cta-spacer" id="cta-spacer" style="display:none;"></div>

    </div>

    <!-- 이미지 라이트박스 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="닫기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <img src="/public/ext_preview.png" class="lightbox-img" onclick="event.stopPropagation()" alt="확장프로그램 미리보기">
    </div>

    <script src="app.js"></script>
</body>
</html>
