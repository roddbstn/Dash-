<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DASH - 공유받은 DB</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 인앱 브라우저 차단 (카카오톡, 라인 등) -->
    <div id="inapp-modal" class="fullscreen-overlay" style="display:none;">
        <div class="modal-card">
            <span class="modal-icon">🌐</span>
            <h2 class="modal-title">브라우저에서 열어주세요</h2>
            <p class="modal-desc">카카오톡·문자 등 앱 내 브라우저에서는<br>링크가 정상 동작하지 않아요.<br><br>주소를 복사해서 <strong>Chrome</strong> 또는<br><strong>Safari</strong>로 열어주세요.</p>
            <button onclick="copyAndClose()" class="btn-modal">주소 복사하기</button>
        </div>
    </div>

    <!-- 메인 랜딩 -->
    <div class="landing-wrap">

        <!-- 헤더 -->
        <header class="landing-header">
            <span class="logo">DASH</span>
        </header>

        <!-- DB 카드 -->
        <div class="db-card">

            <!-- 로딩 -->
            <div id="state-loading" class="state-center">
                <div class="spinner"></div>
                <p>DB를 불러오는 중...</p>
            </div>

            <!-- 오류 -->
            <div id="state-error" class="state-center" style="display:none;">
                <span style="font-size:40px;">🗑</span>
                <p style="color:#8b95a1; margin-top:12px; line-height:1.7;">삭제된 DB이거나<br>유효하지 않은 링크예요.</p>
            </div>

            <!-- 내용 -->
            <div id="db-content" style="display:none;">

                <div class="db-title-row">
                    <h1 class="db-title" id="page-title"></h1>
                    <span class="author-badge" id="author-name"></span>
                </div>

                <!-- 서비스 상세정보 아코디언 -->
                <button class="meta-toggle" onclick="toggleMeta()">
                    <span>서비스 상세 정보</span>
                    <span id="meta-icon">▾</span>
                </button>
                <div id="meta-grid" class="meta-grid" style="display:none;"></div>

                <div class="divider"></div>

                <div class="content-block">
                    <h4 class="content-label">서비스 내용</h4>
                    <p class="content-text" id="main-content"></p>
                </div>

                <div class="content-block" id="opinion-block" style="display:none;">
                    <h4 class="content-label">상담원 소견</h4>
                    <p class="content-text" id="opinion-content"></p>
                </div>

                <div id="enc-notice-area"></div>

            </div>
        </div>

        <!-- CTA 섹션 -->
        <div class="cta-section" id="cta-section" style="display:none;">
            <div class="cta-inner">
                <div class="cta-message">
                    <img src="/public/logo.png" class="cta-logo" alt="DASH">
                    <div class="cta-text">
                        <p class="cta-title">내 계정에 저장하고 바로 활용하세요</p>
                        <p class="cta-sub">저장 즉시 담당자에게 알림이 전송되고,<br>확장프로그램으로 기록에 자동 삽입돼요.</p>
                    </div>
                </div>
                <div class="store-buttons">
                    <a href="#" class="btn-store" target="_blank" rel="noopener">
                        <!-- TODO: replace # with Play Store URL when published -->
                        <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.33.19.7.24 1.06.14l11.08-11.08L12 9.5 3.18 23.76zM20.65 10.4l-2.5-1.44-3.43 3.43 3.43 3.43 2.52-1.45c.72-.41.72-1.56-.02-1.97zM2.01 1.37C1.7 1.69 1.5 2.17 1.5 2.79v18.42c0 .62.2 1.1.52 1.42L2.12 22.7l10.32-10.32v-.24L2.01 1.37zM15.31 4.58 4.24.82c-.36-.1-.73-.05-1.06.14L12 9.5l3.31-4.92z"/></svg>
                        <div class="store-text">
                            <span class="store-sub">Google Play에서</span>
                            <span class="store-name">다운로드</span>
                        </div>
                    </a>
                    <a href="#" class="btn-store" target="_blank" rel="noopener">
                        <!-- TODO: replace # with App Store URL when published -->
                        <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                        <div class="store-text">
                            <span class="store-sub">App Store에서</span>
                            <span class="store-name">다운로드</span>
                        </div>
                    </a>
                </div>
                <!-- 확장프로그램 -->
                <a href="#" class="btn-extension" target="_blank" rel="noopener">
                    <!-- TODO: replace # with Chrome Web Store URL when published -->
                    <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" style="display:none"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v-4h-2zm0-6h2V8h-2z" style="display:none"/><path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm0 4a4 4 0 0 1 4 4H8a4 4 0 0 1 4-4zm0 16.5a8.517 8.517 0 0 1-7.356-4.244L8.142 12A3.994 3.994 0 0 0 12 16a3.994 3.994 0 0 0 3.858-4h6.498A8.517 8.517 0 0 1 12 20.5z"/></svg>
                    <div class="store-text">
                        <span class="store-sub">Chrome 웹 스토어에서</span>
                        <span class="store-name">확장프로그램 설치</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- 모바일 fixed CTA 공간 확보 -->
        <div class="cta-spacer" id="cta-spacer" style="display:none;"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
