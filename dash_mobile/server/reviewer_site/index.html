<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DASH - 공유받은 DB</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 인앱 브라우저 차단 (카카오톡, 라인 등) -->
    <div id="inapp-modal" class="fullscreen-overlay" style="display:none;">
        <div class="modal-card">
            <span class="modal-icon">🌐</span>
            <h2 class="modal-title">브라우저에서 열어주세요</h2>
            <p class="modal-desc">카카오톡·문자 등 앱 내 브라우저에서는<br>링크가 정상 동작하지 않아요.<br><br>주소를 복사해서 <strong>Chrome</strong> 또는<br><strong>Safari</strong>로 열어주세요.</p>
            <button onclick="copyAndClose()" class="btn-modal">주소 복사하기</button>
        </div>
    </div>

    <!-- 메인 랜딩 -->
    <div class="landing-wrap">

        <!-- 헤더 -->
        <header class="landing-header">
            <span class="logo">DASH</span>
        </header>

        <!-- DB 카드 -->
        <div class="db-card">

            <!-- 로딩 -->
            <div id="state-loading" class="state-center">
                <div class="spinner"></div>
                <p>DB를 불러오는 중...</p>
            </div>

            <!-- 오류 -->
            <div id="state-error" class="state-center" style="display:none;">
                <span style="font-size:40px;">🗑</span>
                <p style="color:#8b95a1; margin-top:12px; line-height:1.7;">삭제된 DB이거나<br>유효하지 않은 링크예요.</p>
            </div>

            <!-- 내용 -->
            <div id="db-content" style="display:none;">

                <div class="db-title-row">
                    <h1 class="db-title" id="page-title"></h1>
                    <span class="author-badge" id="author-name"></span>
                </div>

                <!-- 서비스 상세정보 아코디언 -->
                <button class="meta-toggle" onclick="toggleMeta()">
                    <span>서비스 상세 정보</span>
                    <span id="meta-icon">▾</span>
                </button>
                <div id="meta-grid" class="meta-grid" style="display:none;"></div>

                <div class="divider"></div>

                <!-- 앱 유도 안내 -->
                <div style="display:flex; align-items:center; gap:10px; padding:16px; background:#f8f9fa; border-radius:12px; margin-top:4px;">
                    <span style="font-size:22px;">🔒</span>
                    <p style="font-size:13px; color:#6b7684; line-height:1.6; margin:0;">서비스 내용은 앱에서 확인할 수 있어요.<br>아래에서 앱을 설치하고 링크를 다시 열어보세요.</p>
                </div>

            </div>
        </div>

        <!-- CTA 섹션 -->
        <div class="cta-section" id="cta-section" style="display:none;">
            <div class="cta-inner">
                <div class="cta-cols">

                    <!-- 왼쪽: 앱 -->
                    <div class="cta-col">
                        <button class="btn-open-app" onclick="openApp()">앱 열기</button>
                    </div>

                    <!-- 세로 구분선 -->
                    <div class="cta-divider"></div>

                    <!-- 오른쪽: 확장프로그램 -->
                    <div class="cta-col">
                        <a href="https://chromewebstore.google.com/detail/dpncpmegjlgknkagcfjdaccbgmjncdef?utm_source=item-share-cb" class="btn-store" target="_blank" rel="noopener">
                            <img src="/public/chrome_webstore.png" class="store-icon" alt="Chrome Web Store">
                            <div class="store-text">
                                <span class="store-sub">Chrome 웹 스토어에서</span>
                                <span class="store-name">확장프로그램 다운로드</span>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <div class="cta-spacer" id="cta-spacer" style="display:none;"></div>

    </div>

    <!-- 이미지 라이트박스 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="닫기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <img src="/public/ext_preview.png" class="lightbox-img" onclick="event.stopPropagation()" alt="확장프로그램 미리보기">
    </div>

    <script src="app.js"></script>
</body>
</html>
