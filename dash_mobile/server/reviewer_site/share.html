<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dash | Reviewer Board</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" />

</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="header-left">
            </div>
            <div class="header-right">
                <button id="btn-notify-header" class="btn btn-action">저장 알림</button>
            </div>
        </header>

        <main class="content-wrapper">
            <!-- Sidebar / Info Panel (PC) -->
            <aside class="info-sidebar">
                <div class="sidebar-content">
                    <section class="info-section">
                        <h3>서비스 상세정보</h3>
                        <div class="meta-grid" id="pc-meta-grid">
                            <!-- Dynamic items injected here via app.js -->
                            <div class="meta-item">
                                <label>대상자</label>
                                <span id="val-target">불러오는 중...</span>
                            </div>
                        </div>
                    </section>
                </div>
            </aside>

            <!-- Main Editor Area -->
            <section class="editor-area">
                <!-- Mobile Info Accordion -->
                <div id="mobile-info-trigger" class="mobile-info-trigger" style="padding: 16px 24px;">
                    <div class="trigger-top"
                        style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div id="mobile-child-tag"></div>
                        <span class="info-label"
                            style="display: flex; align-items: center; gap: 4px; font-weight: 600;">서비스 상세 정보 <span
                                style="font-size: 1.4em; position: relative; top: -1px;">▾</span></span>
                    </div>
                </div>
                <div id="mobile-info-content" class="mobile-info-content">
                    <div class="meta-grid" id="mobile-meta-grid">
                        <!-- Dynamic items injected here via app.js -->
                    </div>
                </div>

                <div class="editor-container">
                    <div class="editor-header">
                        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                            <h1 id="page-title" style="font-size: 26px;">강O수 아동 사례</h1>
                            <!-- Status moved here -->
                            <div id="save-status" class="save-status"></div>
                        </div>
                        <div class="editor-meta">
                            <span id="author-name">강윤수 상담원 작성</span>
                        </div>
                    </div>

                    <div class="writing-workspace">
                        <h4 style="margin-bottom: 12px; color: #4e5968; font-weight: 700; font-size: 14px;">서비스 내용</h4>
                        <textarea id="main-editor" placeholder="서비스 내용을 입력하세요..."></textarea>

                        <h4
                            style="margin-top: 32px; margin-bottom: 12px; color: #4e5968; font-weight: 700; font-size: 14px;">
                            상담원 소견</h4>
                        <textarea id="opinion-editor" placeholder="상담원 소견을 입력하세요..."></textarea>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom CTA Button (Mobile) -->
        <div class="mobile-cta-container">
            <button id="btn-notify-mobile" class="btn btn-primary-full">수정 내용 저장하고 알리기</button>
        </div>

        <!-- Notifications & Modals -->
        <div id="modal-container" class="modal-backdrop">
            <div class="modal">
                <h2>공유 메모 저장</h2>
                <p>수정한 내용을 저장하고 담당자에게 알릴까요?</p>
                <div class="modal-footer">
                    <button id="btn-modal-cancel" class="btn btn-secondary">취소</button>
                    <button id="btn-modal-confirm" class="btn btn-primary">저장하기</button>
                </div>
            </div>
        </div>


    </div>

    <!-- 이름 인증 오버레이 -->
    <div id="auth-modal" style="
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);">
        <div style="
            background: #fff; border-radius: 20px; padding: 36px 32px;
            width: 100%; max-width: 380px; margin: 0 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);">
            <div style="margin-bottom: 8px;">
                <span style="font-size: 22px;">🔒</span>
            </div>
            <h2 style="font-size: 18px; font-weight: 800; color: #191f28; margin-bottom: 8px;">공유 메모 열기</h2>
            <p style="font-size: 13px; color: #6b7684; line-height: 1.6; margin-bottom: 24px;">
                이 DB를 공유한 상담원의 이름을 입력해주세요.
            </p>
            <input id="auth-name-input" type="text" placeholder="예) 홍길동" maxlength="10"
                style="width: 100%; border: 1.5px solid #e5e8eb; border-radius: 10px;
                padding: 13px 16px; font-size: 15px; font-family: inherit;
                outline: none; color: #191f28; margin-bottom: 8px;
                transition: border-color 0.15s;" />
            <p id="auth-error" style="font-size: 12px; color: #f04452; min-height: 18px; margin-bottom: 16px;"></p>
            <button id="auth-submit-btn" style="
                width: 100%; background: #1a56db; color: #fff;
                border: none; border-radius: 10px; padding: 14px;
                font-size: 15px; font-weight: 700; font-family: inherit;
                cursor: pointer;">확인</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
