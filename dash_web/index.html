<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dash | 공유된 DB</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">

        <!-- Header -->
        <header class="share-header">
            <span class="logo">✦ Dash</span>
        </header>

        <!-- Loading State -->
        <div id="state-loading" class="state-container">
            <div class="spinner"></div>
            <p class="state-text">불러오는 중...</p>
        </div>

        <!-- Error State -->
        <div id="state-error" class="state-container hidden">
            <div class="state-icon error-icon">🔗</div>
            <p class="state-title">링크를 찾을 수 없어요</p>
            <p class="state-desc">존재하지 않거나 만료된 공유 링크입니다.</p>
        </div>

        <!-- Preview Content -->
        <main id="state-preview" class="preview-main hidden">

            <!-- 발신자 뱃지 -->
            <div class="sender-badge">
                <span class="badge-icon">👤</span>
                <span id="author-name">상담원</span>님이 DB를 공유했어요
            </div>

            <!-- 사례 헤더 카드 -->
            <div class="card">
                <div class="card-header-row">
                    <span id="case-name" class="case-name">—</span>
                    <span id="dong-tag" class="dong-tag hidden"></span>
                </div>
                <p id="created-at" class="created-at"></p>
            </div>

            <!-- 서비스 메타 -->
            <div class="card">
                <p class="card-label">서비스 정보</p>
                <div id="meta-grid" class="meta-grid"></div>
            </div>

            <!-- 잠긴 콘텐츠 -->
            <div class="card locked-card">
                <div class="lock-row">
                    <span class="lock-icon">🔒</span>
                    <div>
                        <p class="lock-title">서비스 내용 · 상담원 소견</p>
                        <p class="lock-desc">앱에서 열면 전체 내용을 확인하고 내 DB에 저장할 수 있어요.</p>
                    </div>
                </div>
                <div class="blur-preview">
                    <div class="blur-line w80"></div>
                    <div class="blur-line w60"></div>
                    <div class="blur-line w90"></div>
                    <div class="blur-line w50"></div>
                </div>
            </div>

            <!-- 데스크탑 안내 -->
            <div id="desktop-notice" class="desktop-notice hidden">
                <p>📱 모바일 기기에서 링크를 열거나<br>Dash 앱을 설치해주세요.</p>
                <div class="store-buttons">
                    <a id="btn-appstore" href="#" class="store-btn" target="_blank">
                        <img src="public/appstore-badge.svg" alt="App Store" onerror="this.parentElement.innerHTML='App Store'">
                    </a>
                    <a id="btn-playstore" href="#" class="store-btn" target="_blank">
                        <img src="public/playstore-badge.svg" alt="Google Play" onerror="this.parentElement.innerHTML='Google Play'">
                    </a>
                </div>
            </div>

        </main>

        <!-- 하단 CTA (모바일 전용) -->
        <div id="cta-bar" class="cta-bar hidden">
            <button id="btn-open-app" class="btn-open-app" onclick="openApp()">
                <span id="btn-text">앱에서 열기</span>
            </button>
            <p class="cta-sub">앱이 없으면 스토어로 이동해요</p>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
