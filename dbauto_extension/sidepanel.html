<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>



    <div class="tab-menu">
        <div id="tab-manual" class="tab-item active">수동 입력</div>
        <div id="tab-upload" class="tab-item">엑셀 양식 업로드</div>
        <div id="tab-history" class="tab-item">최근 기록</div>
    </div>


    <div id="status" class="status">파일을 대기 중입니다.</div>

    <!-- 업로드 및 현재 리스트 뷰 -->
    <div id="upload-view" class="hidden">
        <div id="drop-zone" class="drop-zone">
            <svg viewBox="0 0 24 24">
                <path
                    d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
            </svg>
            <div style="color:#4b5563; font-weight: 500;">파일을 마우스로 끌어 오세요</div>
            <div style="color:#9ca3af; font-size:11px;">또는 클릭하여 파일 선택</div>
        </div>
        <input type="file" id="file-input" class="hidden" accept=".xlsx">

        <div id="current-section" class="hidden">
            <div class="section-title">추출된 서비스 목록</div>
            <div id="current-records" class="list-container"></div>
        </div>
    </div>

    <!-- 수동 기입 뷰 -->
    <div id="manual-view">
        <div class="section-title">
            개별 기입할 대상 창
            <span class="title-icons">
                <span class="tooltip-icon" data-tooltip="이용 팁: 여러 DB창을 열어놓고 한 번에 기입해보세요!">💡</span>
                <span class="tooltip-icon" data-tooltip="대상자·담당자는 시스템에서 직접 선택해 주세요. 모든 데이터는 Dash에 저장되지 않습니다.">🚨</span>
            </span>
        </div>
        <div id="manual-form-container">
            <!-- 여기에 동적으로 폼들이 추가됨 -->
        </div>

        <div class="manual-sticky-bar" style="display:flex; gap:8px; align-items:center;">
            <button id="refresh-manual-windows" class="btn-text-muted">전체 새로고침</button>
            <button id="manual-fill-btn" class="btn btn-all-send" style="flex:1;">✦ 전체 창에 일괄 입력</button>
        </div>
    </div>

    <!-- 히스토리 뷰 -->
    <div id="history-view" class="hidden">
        <div class="section-title">
            최근 업로드 기록
            <span id="clear-history" class="clear-btn">전체 삭제</span>
        </div>
        <div id="history-list" class="list-container"></div>
    </div>

    <!-- 하단 공통: 대상 창 선택 영역 -->
    <div id="window-section">
        <div class="section-title">
            입력할 대상 창 (다중 선택 가능)
            <span id="refresh-windows" class="icon-btn" title="대상 창 다시 검색">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.67-5.67" />
                </svg>
            </span>
        </div>
        <div id="window-list" class="list-container">
            <div style="text-align:center; padding:10px; color:#999; font-size:11px;">감지된 시스템 창이 없습니다.</div>
        </div>

        <div class="action-bar">
            <button id="batch-fill-btn" class="btn btn-primary">자동 입력 시작</button>
        </div>
    </div>


    <!-- 외부 라이브러리 -->
    <script src="xlsx.mini.min.js"></script>

    <!-- Core 계층: 설정 & 인터페이스 (가장 먼저 로드) -->
    <script src="core/config.js"></script>
    <script src="core/message-types.js"></script>

    <!-- Adapter 계층: 외부 기술 추상화 -->
    <script src="adapters/chrome-messenger.js"></script>
    <script src="adapters/storage-adapter.js"></script>

    <!-- UI 계층: 각 모듈 (순서 무관, app.js가 초기화) -->
    <script src="ui/tab-manager.js"></script>
    <script src="ui/hover-select.js"></script>
    <script src="ui/date-picker.js"></script>
    <script src="ui/manual-form.js"></script>
    <script src="ui/excel-handler.js"></script>
    <script src="ui/window-manager.js"></script>
    <script src="ui/history-manager.js"></script>

    <!-- 진입점: 모든 모듈 초기화 (마지막에 로드) -->
    <script src="ui/app.js"></script>
</body>

</html>
