<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>dbauto</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #228be6;
            --blue-light: #e7f5ff;
            --blue-dark: #1971c2;
            --green: #40c057;
            --green-light: #ebfbee;
            --red: #fa5252;
            --red-light: #fff5f5;
            --gray-50: #f8f9fa;
            --gray-100: #f1f3f5;
            --gray-200: #e9ecef;
            --gray-400: #ced4da;
            --gray-600: #868e96;
            --gray-800: #343a40;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            width: 380px;
            min-height: 200px;
            background: var(--gray-50);
            color: var(--gray-800);
        }

        /* ── 헤더 ── */
        header {
            background: linear-gradient(135deg, var(--blue-dark), var(--blue));
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }

        header p {
            font-size: 0.75rem;
            color: #a5d8ff;
            margin-top: 2px;
        }

        /* ── 본문 ── */
        .body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── 드롭존 ── */
        #drop-zone {
            border: 2px dashed var(--blue);
            border-radius: 10px;
            background: var(--blue-light);
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        #drop-zone:hover,
        #drop-zone.drag-over {
            background: #d0ebff;
            border-color: var(--blue-dark);
        }

        #drop-zone .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        #drop-zone .main {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--blue-dark);
        }

        #drop-zone .sub {
            font-size: 0.75rem;
            color: var(--gray-600);
            margin-top: 4px;
        }

        #drop-zone.success {
            border-color: var(--green);
            background: var(--green-light);
        }

        #drop-zone.success .main {
            color: #2b8a3e;
        }

        #file-input {
            display: none;
        }

        /* ── 미리보기 ── */
        #preview {
            display: none;
        }

        .preview-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        td {
            padding: 7px 10px;
            font-size: 0.82rem;
            border-bottom: 1px solid var(--gray-100);
        }

        td:first-child {
            font-weight: 600;
            color: var(--gray-600);
            width: 80px;
            background: var(--gray-50);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* ── 버튼 ── */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-green {
            background: var(--green);
            color: white;
        }

        .btn-green:hover:not(:disabled) {
            background: #37b24d;
        }

        .btn-green:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
        }

        /* ── 로그 ── */
        #log {
            display: none;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 180px;
            overflow-y: auto;
        }

        .log-item {
            padding: 7px 10px;
            border-radius: 6px;
            font-size: 0.82rem;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(3px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-status {
            background: var(--blue-light);
            color: var(--blue-dark);
        }

        .log-success {
            background: var(--green-light);
            color: #2b8a3e;
        }

        .log-fail {
            background: var(--red-light);
            color: var(--red);
        }

        .log-error {
            background: var(--red-light);
            color: var(--red);
            font-weight: 600;
        }

        .log-done {
            background: var(--green-light);
            color: #2b8a3e;
            font-weight: 700;
        }

        /* ── 진행 바 ── */
        .progress-wrap {
            background: var(--gray-200);
            border-radius: 99px;
            height: 5px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 99px;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>🏷️ dbauto</h1>
            <p>엑셀 → labelmaker.kr 자동 입력</p>
        </div>
    </header>

    <div class="body">

        <!-- 드롭존 -->
        <div id="drop-zone">
            <div class="icon">📂</div>
            <div class="main">엑셀 파일을 드래그하거나 클릭하세요</div>
            <div class="sub">.xlsx 파일만 지원합니다</div>
        </div>
        <input type="file" id="file-input" accept=".xlsx">

        <!-- 미리보기 -->
        <div id="preview">
            <div class="preview-title">📋 파싱된 데이터</div>
            <table id="preview-table"></table>
        </div>

        <!-- 실행 버튼 -->
        <button class="btn btn-green" id="run-btn" style="display:none">
            ▶️ 자동 입력 시작
        </button>

        <!-- 진행 상황 -->
        <div id="log">
            <div class="progress-wrap" style="margin-bottom:8px">
                <div id="progress-bar"></div>
            </div>
            <div class="log-list" id="log-list"></div>
        </div>

    </div>

    <script src="xlsx.mini.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
