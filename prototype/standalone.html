<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dash 프로토타입 — 사용성 테스트</title>
<link rel="stylesheet" href="standalone.css?v=10">
</head>
<body>

<!-- Side Handle Reopen Button -->
<button id="reopen-panel-btn" class="reopen-btn" onclick="togglePanel()">
    <span>◀ DASH</span>
</button>

<!-- ===== LEFT: DB System Prototype ===== -->
<div class="left-panel" id="left-panel">
    <iframe id="proto-frame" src="index_8000.html" class="proto-iframe"></iframe>
</div>

<!-- ===== RIGHT: Extension Sidepanel ===== -->
<div class="right-panel" id="right-panel">
    <div class="sp-header">
        <span class="sp-logo">✦</span> Dash · 초간단 아동학대정보시스템 DB 입력기
        <button class="sp-close" onclick="togglePanel()">✕</button>
    </div>

    <!-- Main Tabs -->
    <div class="sp-main-tabs">
        <div class="main-tab active" data-tab="manual">수동 입력</div>
        <div class="main-tab" data-tab="upload">엑셀 양식 업로드</div>
        <div class="main-tab" data-tab="history">최근 기록</div>
    </div>

    <div class="sp-scroll-content">

        <!-- ═══ 수동 입력 뷰 ═══ -->
        <div id="manual-view" class="tab-view">
            <div class="sp-banner">
                <div class="banner-main">⚠ 대상자·담당자는 시스템에서 직접 선택해 주세요.</div>
                <div class="banner-sub">※ 모든 데이터는 서버에 저장되지 않습니다.</div>
            </div>

            <div class="sp-section-title">
                개별 기입할 대상 창
                <span class="sp-tips">
                    <span class="tip-icon" title="여러 DB창을 열어놓고 한 번에 기입해보세요!">💡</span>
                    <span class="tip-icon" title="대상자·담당자는 시스템에서 직접 선택해 주세요.">🚨</span>
                </span>
            </div>

            <div id="manual-form-container"></div>
        </div>

        <!-- ═══ 엑셀 업로드 뷰 ═══ -->
        <div id="upload-view" class="tab-view hidden">
            <div id="status" class="status">파일을 대기 중입니다.</div>
            <div id="drop-zone" class="drop-zone">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="#d1d6db">
                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                </svg>
                <div style="color:#4b5563; font-weight:600; font-size:15px;">파일을 마우스로 끌어 오세요</div>
                <div style="color:#9ca3af; font-size:13px;">또는 클릭하여 .xlsx 파일 선택</div>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".xlsx">
            <div id="current-section" class="hidden">
                <div class="sp-section-title excel-section-title">추출된 서비스 목록</div>
                <div id="current-records" class="list-container"></div>
            </div>

            <!-- 엑셀 하단: 대상 창 + 자동 입력 -->
            <div id="excel-window-section" class="hidden" style="margin-top:16px;">
                <div class="sp-section-title">입력할 대상 창</div>
                <div class="item-row selected" style="pointer-events:none;">
                    <input type="checkbox" class="checkbox" checked disabled>
                    <span class="match-badge" style="background:#C2FFA7;color:#222;">1</span>
                    <div class="item-info">
                        <div class="item-title">서비스 제공 내용 (프로토타입) — 강화정</div>
                    </div>
                </div>
                <div style="margin-top:10px;">
                    <button class="btn-send-single" style="width:100%;" onclick="handleExcelAutoFill()">✦ 선택된 데이터 자동 입력</button>
                </div>
            </div>
        </div>

        <!-- ═══ 최근 기록 뷰 ═══ -->
        <div id="history-view" class="tab-view hidden">
            <div class="sp-section-title">
                최근 업로드 기록
                <span class="clear-btn" onclick="clearHistory()">전체 삭제</span>
            </div>
            <div id="history-list" class="list-container"></div>
        </div>

    </div><!-- /.sp-scroll-content -->

    <div class="sp-sticky-bar">
        <button class="btn-text-muted" onclick="resetAllForms()">전체 새로고침</button>
        <button class="btn-all-send" onclick="handleSingleFill()">✦ 이 창에 DB 입력</button>
    </div>

    <div class="sp-footer">
        <a href="https://dash-proto.vercel.app/privacy.html" target="_blank">개인정보처리방침</a>
    </div>
</div>

<!-- SheetJS for Excel parsing -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.mini.min.js"></script>
<script src="standalone.js?v=10"></script>
</body>
</html>
